<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wyzie@1.0.6/dist/wyzie.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  font-family: system-ui, sans-serif;
  color: #fff;
  overflow: hidden;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  background: #000;
  z-index: 20;
}

#loader-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 0.6s ease;
  opacity: 0;
}

.spinner {
  position: relative;
  z-index: 1;
  width: 72px;
  height: 72px;
  border: 5px solid rgba(255,255,255,0.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#loader-text {
  position: relative;
  z-index: 1;
  font-size: 0.95rem;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.04em;
  text-shadow: 0 1px 4px #000;
}

#player {
  position: fixed;
  inset: 0;
  display: none;
  background: #000;
  z-index: 5;
}

video {
  width: 100%;
  height: 100%;
  display: block;
  background: #000;
}

#usage {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: #000;
  gap: 10px;
  z-index: 15;
}

#usage p {
  font-size: 1.05rem;
  color: rgba(255,255,255,0.65);
  line-height: 2;
}

#err {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: #000;
  z-index: 15;
}

#err-title {
  font-size: 2.4rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 18px;
}

#err-link {
  font-size: 1.1rem;
  color: #60a5fa;
  text-decoration: underline;
  cursor: pointer;
}

#err-link:hover {
  color: #93c5fd;
}

#err-detail {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.78rem;
  color: rgba(255,255,255,0.35);
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Subtitle Settings Button - appears near video controls */
.subtitle-settings-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 60;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  padding: 10px 16px;
  border-radius: 40px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  display: none;
  align-items: center;
  gap: 8px;
  transition: all 0.2s ease;
}

.subtitle-settings-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: scale(0.96);
}

/* Settings Modal */
#settings-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(12px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.settings-card {
  background: #1a1a24;
  border-radius: 32px;
  width: 90%;
  max-width: 420px;
  padding: 28px 24px 32px;
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.settings-card h3 {
  font-size: 1.6rem;
  font-weight: 600;
  margin-bottom: 24px;
}

.control-group {
  margin-bottom: 20px;
}

.control-group label {
  display: block;
  font-size: 0.85rem;
  margin-bottom: 8px;
  color: #ccc;
}

.control-group input,
.control-group select {
  width: 100%;
  background: #2a2a35;
  border: 1px solid #3a3a45;
  padding: 10px 14px;
  border-radius: 24px;
  color: white;
  font-size: 0.9rem;
  outline: none;
}

.color-row {
  display: flex;
  gap: 12px;
  align-items: center;
}

.color-row input[type="color"] {
  width: 55px;
  height: 44px;
  border-radius: 16px;
  cursor: pointer;
}

.range-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.range-row input {
  flex: 1;
}

.close-settings {
  background: white;
  border: none;
  width: 100%;
  padding: 12px;
  border-radius: 40px;
  font-weight: bold;
  font-size: 1rem;
  color: black;
  margin-top: 16px;
  cursor: pointer;
}

.close-settings:hover {
  background: #e0e0e0;
}

#no-subs-badge {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 60;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  display: none;
}

/* Playback speed indicator */
.speed-indicator {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
  padding: 8px 16px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 500;
  color: white;
  z-index: 60;
  display: none;
  pointer-events: none;
  animation: fadeOut 1.5s ease forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

.wyzie-subtitle {
  transition: all 0.15s ease;
  text-align: center;
}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Stream</span><br><br>
    <code style="color:rgba(255,255,255,.8)">?id=550</code> &nbsp;— movie<br>
    <code style="color:rgba(255,255,255,.8)">?id=456&amp;s=1&amp;e=1</code> &nbsp;— TV episode
  </p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try vidsrc.xyz instead?</a>
  <div id="err-detail"></div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline></video>
</div>

<!-- Subtitle Settings Button -->
<button class="subtitle-settings-btn" id="subtitle-settings-btn">
  ⚙️ Subtitle Style
</button>

<div id="no-subs-badge">📄 No subtitles available</div>
<div id="speed-indicator" class="speed-indicator"></div>

<!-- Subtitle Settings Modal -->
<div id="settings-modal">
  <div class="settings-card">
    <h3>🎨 Subtitle Style</h3>
    
    <div class="control-group">
      <label>📝 Font Size</label>
      <div class="range-row">
        <input type="range" id="sub-font-size" min="12" max="48" step="1" value="22">
        <span id="font-size-val">22px</span>
      </div>
    </div>
    
    <div class="control-group">
      <label>🖋️ Font Family</label>
      <select id="sub-font-family">
        <option value="system-ui, -apple-system, sans-serif">System Default</option>
        <option value="'Segoe UI', Roboto, sans-serif">Segoe / Roboto</option>
        <option value="'Inter', sans-serif">Inter</option>
        <option value="'Montserrat', sans-serif">Montserrat</option>
        <option value="'Courier New', monospace">Monospace</option>
      </select>
    </div>
    
    <div class="control-group">
      <label>🎨 Text Color</label>
      <div class="color-row">
        <input type="color" id="sub-text-color" value="#FFFFFF">
        <span style="font-size:0.8rem;">White / custom</span>
      </div>
    </div>
    
    <div class="control-group">
      <label>📦 Background Color</label>
      <div class="color-row">
        <input type="color" id="sub-bg-color" value="#000000">
        <span style="font-size:0.8rem;">Background color</span>
      </div>
    </div>
    
    <div class="control-group">
      <label>🔲 Background Opacity</label>
      <div class="range-row">
        <input type="range" id="sub-bg-opacity" min="0" max="1" step="0.05" value="0.75">
        <span id="opacity-val">0.75</span>
      </div>
    </div>
    
    <div class="control-group">
      <label>📏 Text Outline / Shadow</label>
      <select id="sub-shadow">
        <option value="soft">Soft shadow (default)</option>
        <option value="thick">Thick outline (high contrast)</option>
        <option value="none">No shadow</option>
      </select>
    </div>
    
    <button class="close-settings" id="close-settings-btn">Apply & Close</button>
  </div>
</div>

<script>
// ========== CONFIGURATION ==========
const WYZIE_API_KEY = "wyzie-17cb79da72500da5414937d15bbd0c7c";
const TMDB_KEY = '10bbe67e0f7cbf6673834b2412e2e392';

let wyzieInstance = null;
let videoElement = null;
let subtitlesEnabled = true;
let noSubsAvailable = false;
let currentMediaId = null;
let currentIsTv = false;
let currentSeason = null;
let currentEpisode = null;
let currentSubtitleUrl = null;
let availableSubtitles = [];

// ========== SUBTITLE FUNCTIONS ==========
async function fetchSubtitles(tmdbId, language, isTv, season, episode) {
  try {
    let searchId = tmdbId;
    if (isTv && season && episode) {
      searchId = `${tmdbId}_${season}_${episode}`;
    }
    const url = `https://sub.wyzie.io/search?id=${searchId}&language=${language}&key=${WYZIE_API_KEY}`;
    console.log('Fetching subtitles:', url);
    
    const response = await fetch(url);
    if (!response.ok) {
      console.warn('Wyzie API responded with status:', response.status);
      return [];
    }
    
    const data = await response.json();
    console.log('Wyzie API response:', data);
    
    // Handle array response
    if (Array.isArray(data) && data.length > 0) {
      return data;
    }
    
    return [];
  } catch (error) {
    console.error('Failed to fetch subtitles:', error);
    return [];
  }
}

async function loadSubtitleByIndex(index) {
  if (!availableSubtitles.length || !videoElement) return false;
  
  const subtitle = availableSubtitles[index];
  if (!subtitle || !subtitle.url) return false;
  
  const subUrl = subtitle.url;
  currentSubtitleUrl = subUrl;
  
  try {
    // Destroy existing instance
    if (wyzieInstance) {
      wyzieInstance.destroy();
      wyzieInstance = null;
    }
    
    const proxiedUrl = '/api?url=' + encodeURIComponent(subUrl);
    
    // Initialize Wyzie
    wyzieInstance = new Wyzie({
      video: videoElement,
      subtitleUrl: proxiedUrl,
      defaultEnabled: true,
      style: {
        fontSize: '22px',
        fontFamily: 'system-ui, -apple-system, sans-serif',
        color: '#FFFFFF',
        backgroundColor: 'rgba(0,0,0,0.75)',
        textShadow: '1px 1px 2px rgba(0,0,0,0.8)',
        padding: '0.2em 0.5em',
        borderRadius: '8px',
        textAlign: 'center'
      }
    });
    
    wyzieInstance.enable();
    subtitlesEnabled = true;
    noSubsAvailable = false;
    document.getElementById('no-subs-badge').style.display = 'none';
    
    // Apply custom styles
    applySubtitleStyles();
    
    return true;
  } catch (error) {
    console.error('Wyzie initialization error:', error);
    return false;
  }
}

async function loadSubtitles(language = 'en') {
  if (!currentMediaId || !videoElement) return false;
  
  const noSubsBadge = document.getElementById('no-subs-badge');
  
  try {
    availableSubtitles = await fetchSubtitles(currentMediaId, language, currentIsTv, currentSeason, currentEpisode);
    
    if (!availableSubtitles.length) {
      console.log('No subtitles found for language:', language);
      noSubsAvailable = true;
      noSubsBadge.style.display = 'block';
      return false;
    }
    
    // Load the first subtitle
    const success = await loadSubtitleByIndex(0);
    if (!success) {
      noSubsAvailable = true;
      noSubsBadge.style.display = 'block';
      return false;
    }
    
    noSubsBadge.style.display = 'none';
    return true;
  } catch (error) {
    console.error('Load subtitles error:', error);
    noSubsAvailable = true;
    noSubsBadge.style.display = 'block';
    return false;
  }
}

function toggleSubtitles() {
  if (!wyzieInstance || noSubsAvailable) return;
  
  if (subtitlesEnabled) {
    wyzieInstance.disable();
    subtitlesEnabled = false;
  } else {
    wyzieInstance.enable();
    subtitlesEnabled = true;
  }
}

function applySubtitleStyles() {
  if (!wyzieInstance) return;
  
  const fontSize = document.getElementById('sub-font-size').value + 'px';
  const fontFamily = document.getElementById('sub-font-family').value;
  const textColor = document.getElementById('sub-text-color').value;
  const rawBgColor = document.getElementById('sub-bg-color').value;
  const bgOpacity = parseFloat(document.getElementById('sub-bg-opacity').value);
  const shadowType = document.getElementById('sub-shadow').value;
  
  let bgRgba = rawBgColor;
  if (rawBgColor.startsWith('#')) {
    const r = parseInt(rawBgColor.slice(1, 3), 16);
    const g = parseInt(rawBgColor.slice(3, 5), 16);
    const b = parseInt(rawBgColor.slice(5, 7), 16);
    bgRgba = `rgba(${r}, ${g}, ${b}, ${bgOpacity})`;
  } else {
    bgRgba = `rgba(0,0,0,${bgOpacity})`;
  }
  
  let textShadow = '1px 1px 2px rgba(0,0,0,0.8)';
  if (shadowType === 'thick') {
    textShadow = '2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000';
  } else if (shadowType === 'none') {
    textShadow = 'none';
  }
  
  wyzieInstance.setStyle({
    fontSize: fontSize,
    fontFamily: fontFamily,
    color: textColor,
    backgroundColor: bgRgba,
    textShadow: textShadow,
    padding: '0.2em 0.5em',
    borderRadius: '8px',
    textAlign: 'center'
  });
}

// ========== PLAYBACK SPEED CONTROL ==========
function setPlaybackSpeed(speed) {
  if (!videoElement) return;
  videoElement.playbackRate = speed;
  
  const speedIndicator = document.getElementById('speed-indicator');
  speedIndicator.textContent = `${speed}x`;
  speedIndicator.style.display = 'block';
  speedIndicator.style.animation = 'none';
  setTimeout(() => {
    speedIndicator.style.animation = 'fadeOut 1.5s ease forwards';
  }, 10);
}

// Add keyboard shortcuts for speed
function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    if (!videoElement) return;
    
    // Ctrl + + : Increase speed
    if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '=')) {
      e.preventDefault();
      let newSpeed = Math.min(4, videoElement.playbackRate + 0.25);
      setPlaybackSpeed(newSpeed);
    }
    // Ctrl + - : Decrease speed
    else if ((e.ctrlKey || e.metaKey) && e.key === '-') {
      e.preventDefault();
      let newSpeed = Math.max(0.25, videoElement.playbackRate - 0.25);
      setPlaybackSpeed(newSpeed);
    }
    // Ctrl + 0 : Reset speed to 1x
    else if ((e.ctrlKey || e.metaKey) && e.key === '0') {
      e.preventDefault();
      setPlaybackSpeed(1);
    }
    // C : Toggle subtitles
    else if (e.key === 'c' || e.key === 'C') {
      e.preventDefault();
      toggleSubtitles();
    }
  });
}

// ========== PICTURE-IN-PICTURE ==========
function setupPictureInPicture() {
  if (!videoElement) return;
  
  // PiP is already supported by native controls
  // Adding keyboard shortcut: Ctrl + P
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 'P')) {
      e.preventDefault();
      if (document.pictureInPictureElement) {
        document.exitPictureInPicture();
      } else if (videoElement) {
        videoElement.requestPictureInPicture();
      }
    }
  });
}

// ========== MESSAGES & UI HELPERS ==========
const rotatingMessages = [
  'Loading stream...', 'Contacting the mothership...', 'Bribing the servers...',
  'Untangling the cables...', 'Asking nicely...', 'Decoding the matrix...',
  'Warming up the hamsters...', 'Negotiating with the cloud...', 'Almost there...',
  'Fetching subtitles...', 'Summoning bandwidth...'
];

let msgInterval;

function startMessageRotation() {
  let idx = 0;
  const msgEl = document.getElementById('loader-text');
  msgInterval = setInterval(() => {
    idx = (idx + 1) % rotatingMessages.length;
    if (msgEl) msgEl.textContent = rotatingMessages[idx];
  }, 2200);
}

function stopMessageRotation() {
  if (msgInterval) clearInterval(msgInterval);
}

async function loadBackdrop(id, isTv) {
  const type = isTv ? 'tv' : 'movie';
  try {
    const response = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}`);
    const data = await response.json();
    const img = data.backdrop_path || data.poster_path;
    if (img) {
      const url = `https://wsrv.nl/?url=${encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img)}&bg=black&blur=3`;
      const bgDiv = document.getElementById('loader-bg');
      const preload = new Image();
      preload.onload = () => {
        if (bgDiv) {
          bgDiv.style.backgroundImage = `url(${url})`;
          bgDiv.style.opacity = '1';
        }
      };
      preload.src = url;
    }
  } catch (e) {
    console.warn('Backdrop load error:', e);
  }
}

function showPlayer() {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player').style.display = 'block';
  document.getElementById('subtitle-settings-btn').style.display = 'flex';
}

function showError(msg) {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
  
  const urlParams = new URLSearchParams(location.search);
  const isTv = !!urlParams.get('s');
  const mid = urlParams.get('id');
  const seas = urlParams.get('s') || '';
  const ep = urlParams.get('e') || '1';
  const vidsrcUrl = isTv
    ? 'https://vidsrc.xyz/embed/tv?tmdb=' + mid + '&season=' + seas + '&episode=' + ep
    : 'https://vidsrc.xyz/embed/movie?tmdb=' + mid;
  document.getElementById('err-link').href = vidsrcUrl;
}

// ========== STREAM PLAYBACK ==========
async function playStream(playlistUrl, tmdbId, isTv, season, episode) {
  currentMediaId = tmdbId;
  currentIsTv = isTv;
  currentSeason = season;
  currentEpisode = episode;
  
  const src = '/api?url=' + encodeURIComponent(playlistUrl);
  const video = document.getElementById('v');
  videoElement = video;
  
  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(video);
    
    hls.on(Hls.Events.MANIFEST_PARSED, async () => {
      showPlayer();
      // Try to load subtitles
      await loadSubtitles('en');
      // Try to autoplay
      video.play().catch(e => console.log('Autoplay blocked:', e.message));
    });
    
    hls.on(Hls.Events.ERROR, function(_, data) {
      if (data.fatal) {
        showError(data.details || 'HLS fatal error');
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    video.addEventListener('canplay', async () => {
      showPlayer();
      await loadSubtitles('en');
      video.play().catch(e => console.log('Autoplay blocked:', e.message));
    });
  } else {
    showError('HLS not supported');
  }
  
  // Setup additional features
  setupKeyboardShortcuts();
  setupPictureInPicture();
}

// ========== INITIALIZATION ==========
const urlParams = new URLSearchParams(location.search);
const id = urlParams.get('id');
const season = urlParams.get('s');
const episode = urlParams.get('e');
const isTv = !!season;

if (!id) {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  startMessageRotation();
  loadBackdrop(id, isTv);
  
  const apiEndpoint = `/api?${isTv ? `id=${id}&s=${season}&e=${episode || '1'}` : `id=${id}`}`;
  
  fetch(apiEndpoint)
    .then(response => response.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      if (!data.url) throw new Error('No stream URL received');
      playStream(data.url, id, isTv, season, episode || '1');
    })
    .catch(err => showError(err.message));
}

// ========== EVENT LISTENERS ==========
document.getElementById('subtitle-settings-btn')?.addEventListener('click', () => {
  document.getElementById('settings-modal').style.display = 'flex';
});
document.getElementById('close-settings-btn')?.addEventListener('click', () => {
  document.getElementById('settings-modal').style.display = 'none';
  applySubtitleStyles();
});
document.getElementById('settings-modal')?.addEventListener('click', (e) => {
  if (e.target === document.getElementById('settings-modal')) {
    document.getElementById('settings-modal').style.display = 'none';
  }
});

// Style input listeners
document.getElementById('sub-font-size')?.addEventListener('input', (e) => {
  document.getElementById('font-size-val').innerText = e.target.value + 'px';
  applySubtitleStyles();
});
document.getElementById('sub-font-family')?.addEventListener('change', applySubtitleStyles);
document.getElementById('sub-text-color')?.addEventListener('input', applySubtitleStyles);
document.getElementById('sub-bg-color')?.addEventListener('input', applySubtitleStyles);
document.getElementById('sub-bg-opacity')?.addEventListener('input', (e) => {
  document.getElementById('opacity-val').innerText = e.target.value;
  applySubtitleStyles();
});
document.getElementById('sub-shadow')?.addEventListener('change', applySubtitleStyles);

// Save settings to localStorage
function saveSettings() {
  const settings = {
    fontSize: document.getElementById('sub-font-size')?.value || 22,
    fontFamily: document.getElementById('sub-font-family')?.value || 'system-ui, -apple-system, sans-serif',
    textColor: document.getElementById('sub-text-color')?.value || '#FFFFFF',
    bgColor: document.getElementById('sub-bg-color')?.value || '#000000',
    bgOpacity: document.getElementById('sub-bg-opacity')?.value || 0.75,
    shadow: document.getElementById('sub-shadow')?.value || 'soft'
  };
  localStorage.setItem('subtitleSettings', JSON.stringify(settings));
}

function loadSettings() {
  const saved = localStorage.getItem('subtitleSettings');
  if (saved) {
    try {
      const settings = JSON.parse(saved);
      if (document.getElementById('sub-font-size')) document.getElementById('sub-font-size').value = settings.fontSize || 22;
      if (document.getElementById('sub-font-family')) document.getElementById('sub-font-family').value = settings.fontFamily || 'system-ui, -apple-system, sans-serif';
      if (document.getElementById('sub-text-color')) document.getElementById('sub-text-color').value = settings.textColor || '#FFFFFF';
      if (document.getElementById('sub-bg-color')) document.getElementById('sub-bg-color').value = settings.bgColor || '#000000';
      if (document.getElementById('sub-bg-opacity')) document.getElementById('sub-bg-opacity').value = settings.bgOpacity || 0.75;
      if (document.getElementById('sub-shadow')) document.getElementById('sub-shadow').value = settings.shadow || 'soft';
      
      if (document.getElementById('font-size-val')) document.getElementById('font-size-val').innerText = (settings.fontSize || 22) + 'px';
      if (document.getElementById('opacity-val')) document.getElementById('opacity-val').innerText = settings.bgOpacity || 0.75;
      
      if (wyzieInstance) applySubtitleStyles();
    } catch (e) {}
  }
}

// Auto-save on style changes
const styleInputs = ['sub-font-size', 'sub-font-family', 'sub-text-color', 'sub-bg-color', 'sub-bg-opacity', 'sub-shadow'];
styleInputs.forEach(id => {
  document.getElementById(id)?.addEventListener('change', saveSettings);
});

loadSettings();
</script>
</body>
