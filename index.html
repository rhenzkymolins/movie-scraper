<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream - Netflix Style Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  background: #000;
  z-index: 20;
}

#loader-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 0.6s ease;
  opacity: 0;
}

.spinner {
  position: relative;
  z-index: 1;
  width: 72px;
  height: 72px;
  border: 5px solid rgba(255,255,255,0.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#loader-text {
  position: relative;
  z-index: 1;
  font-size: 0.95rem;
  color: rgba(255,255,255,0.6);
}

#player {
  position: fixed;
  inset: 0;
  display: none;
  background: #000;
  z-index: 5;
}

video {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
  background: #000;
}

#usage, #err {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: #000;
  z-index: 15;
}

#usage p {
  font-size: 1.05rem;
  color: rgba(255,255,255,0.65);
  line-height: 2;
}

#err-title {
  font-size: 2.4rem;
  font-weight: 700;
  margin-bottom: 18px;
}

#err-link {
  font-size: 1.1rem;
  color: #60a5fa;
  text-decoration: underline;
  cursor: pointer;
}

#err-detail {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.78rem;
  color: rgba(255,255,255,0.35);
}

/* Netflix Style Custom Controls */
.custom-controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
  padding: 30px 40px 20px;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.custom-controls.visible {
  opacity: 1;
  pointer-events: auto;
}

.progress-section {
  margin-bottom: 20px;
}

.progress-container {
  cursor: pointer;
  padding: 8px 0;
}

.progress-bar-bg {
  background: rgba(255,255,255,0.3);
  height: 4px;
  border-radius: 4px;
  position: relative;
  transition: height 0.2s;
}

.progress-bar-bg:hover {
  height: 6px;
}

.progress-fill {
  background: #e50914;
  height: 100%;
  border-radius: 4px;
  width: 0%;
  position: relative;
}

.progress-handle {
  position: absolute;
  right: -8px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  background: #e50914;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s;
}

.progress-bar-bg:hover .progress-handle {
  opacity: 1;
}

.time-display {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  font-family: monospace;
}

.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 15px;
}

.left-controls {
  display: flex;
  align-items: center;
  gap: 20px;
}

.right-controls {
  display: flex;
  align-items: center;
  gap: 20px;
}

.ctrl-btn {
  background: transparent;
  border: none;
  color: white;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.ctrl-btn:hover {
  transform: scale(1.1);
}

.play-btn {
  background: white;
  color: black;
  width: 44px;
  height: 44px;
  border-radius: 50%;
}

.play-btn:hover {
  transform: scale(1.08);
  background: #f0f0f0;
}

.skip-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
}

.skip-btn:hover {
  background: rgba(255,255,255,0.2);
}

.volume-container {
  display: flex;
  align-items: center;
  gap: 12px;
}

.volume-slider {
  width: 80px;
  height: 4px;
  -webkit-appearance: none;
  background: rgba(255,255,255,0.3);
  border-radius: 4px;
  outline: none;
  cursor: pointer;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: white;
  cursor: pointer;
}

.menu-btn {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 8px 16px;
  gap: 6px;
}

.menu-btn:hover {
  background: rgba(255,255,255,0.2);
}

.dropdown-menu {
  position: fixed;
  bottom: 80px;
  right: 40px;
  background: rgba(20, 20, 30, 0.98);
  backdrop-filter: blur(12px);
  border-radius: 12px;
  padding: 12px 0;
  min-width: 220px;
  z-index: 51;
  display: none;
  border: 1px solid rgba(255,255,255,0.1);
}

.dropdown-menu.show {
  display: block;
}

.menu-item {
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.2s;
  font-size: 14px;
  color: #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-item:hover {
  background: rgba(255,255,255,0.1);
  color: white;
}

.menu-item .value {
  color: #e50914;
}

.menu-divider {
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 8px 0;
}

.submenu {
  padding-left: 20px;
  display: none;
}

.submenu.show {
  display: block;
}

#subtitle-container {
  position: fixed;
  bottom: 100px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 45;
  pointer-events: none;
}

.subtitle-text {
  display: inline-block;
  background: transparent;
  color: white;
  font-size: 18px;
  font-family: system-ui, -apple-system, sans-serif;
  padding: 0.1em 0.3em;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  max-width: 90%;
  word-wrap: break-word;
}

@media (max-width: 768px) {
  .custom-controls { padding: 20px 20px 15px; }
  .play-btn { width: 36px; height: 36px; }
  .skip-btn { width: 32px; height: 32px; }
  .subtitle-text { font-size: 14px; }
  .dropdown-menu { right: 20px; bottom: 70px; }
}

.no-subs-badge {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  display: none;
  z-index: 45;
}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Stream</span><br><br>
    <code>?id=550</code> — movie<br>
    <code>?id=456&amp;s=1&amp;e=1</code> — TV episode

<div class="no-subs-badge" id="no-subs-badge">No subtitles available</div>

<div class="custom-controls" id="custom-controls">
  <div class="progress-section">

<div class="dropdown-menu" id="settings-menu">
  <div class="menu-item" id="speed-menu-item">

  </div>
  <div class="menu-divider"></div>

</div>

<script>
// ========== CONFIGURATION ==========
const WYZIE_API_KEY = "wyzie-17cb79da72500da5414937d15bbd0c7c";
const TMDB_KEY = '10bbe67e0f7cbf6673834b2412e2e392';

let videoElement = null;
let currentMediaId = null;
let currentIsTv = false;
let currentSeason = null;
let currentEpisode = null;
let availableSubtitles = [];
let currentSubtitleCues = [];
let subtitleEnabled = false;
let subtitleInterval = null;
let currentLanguage = 'en';
let controlsTimeout = null;

// ========== SAFE SRT PARSER (No Regex Errors) ==========
function parseSRT(srtText) {
  const cues = [];
  if (!srtText || typeof srtText !== 'string') return cues;
  
  const lines = srtText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  let currentCue = null;
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    
    // Check if line contains timestamp (has -->)
    if (line.indexOf('-->') > -1) {
      // Parse timestamp line
      const parts = line.split('-->');
      if (parts.length === 2) {
        const startStr = parts[0].trim();
        const endStr = parts[1].trim();
        
        const start = parseTime(startStr);
        const end = parseTime(endStr);
        
        if (start !== null && end !== null) {
          currentCue = { start, end, text: '' };
        }
      }
    } 
    else if (currentCue && !line.match(/^\d+$/)) {
      // This is text content (not a number/ID line)
      if (currentCue.text) {
        currentCue.text += ' ' + line;
      } else {
        currentCue.text = line;
      }
    }
    
    // Check if next line is empty or next cue starts
    if (currentCue && currentCue.text && (i + 1 >= lines.length || lines[i + 1].trim() === '' || lines[i + 1].indexOf('-->') > -1)) {
      if (currentCue.text) {
        cues.push({ start: currentCue.start, end: currentCue.end, text: currentCue.text });
      }
      currentCue = null;
    }
  }
  
  return cues.sort(function(a, b) { return a.start - b.start; });
}

function parseTime(timeStr) {
  // Supports formats: 00:00:00,000 or 00:00:00.000
  let hours = 0, minutes = 0, seconds = 0, milliseconds = 0;
  
  // Try to match with comma
  let match = timeStr.match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
  if (!match) {
    // Try with dot
    match = timeStr.match(/(\d{2}):(\d{2}):(\d{2})\.(\d{3})/);
  }
  
  if (match) {
    hours = parseInt(match[1], 10);
    minutes = parseInt(match[2], 10);
    seconds = parseInt(match[3], 10);
    milliseconds = parseInt(match[4], 10);
    return hours * 3600 + minutes * 60 + seconds + milliseconds / 1000;
  }
  return null;
}

async function loadSRT(url) {
  try {
    const response = await fetch('/api?url=' + encodeURIComponent(url));
    if (!response.ok) return [];
    const text = await response.text();
    return parseSRT(text);
  } catch (error) {
    console.error('SRT load error:', error);
    return [];
  }
}

async function fetchSubtitles(tmdbId, language) {
  try {
    let searchId = tmdbId;
    if (currentIsTv && currentSeason && currentEpisode) {
      searchId = tmdbId + '_' + currentSeason + '_' + currentEpisode;
    }
    const url = 'https://sub.wyzie.io/search?id=' + searchId + '&language=' + language + '&key=' + WYZIE_API_KEY;
    const response = await fetch(url);
    if (!response.ok) return [];
    const data = await response.json();
    return Array.isArray(data) ? data : [];
  } catch (error) {
    return [];
  }
}

async function loadSubtitles(language) {
  if (!currentMediaId) return false;
  
  try {
    availableSubtitles = await fetchSubtitles(currentMediaId, language);
    if (!availableSubtitles.length) {
      document.getElementById('no-subs-badge').style.display = 'block';
      document.getElementById('subtitle-status').innerHTML = 'None';
      return false;
    }
    
    const cues = await loadSRT(availableSubtitles[0].url);
    if (cues.length) {
      currentSubtitleCues = cues;
      subtitleEnabled = true;
      if (subtitleInterval) clearInterval(subtitleInterval);
      subtitleInterval = setInterval(updateSubtitleDisplay, 100);
      document.getElementById('no-subs-badge').style.display = 'none';
      document.getElementById('subtitle-status').innerHTML = language.toUpperCase();
      return true;
    }
    return false;
  } catch (error) {
    return false;
  }
}

function updateSubtitleDisplay() {
  const display = document.getElementById('subtitle-display');
  if (!display) return;
  if (!videoElement || !subtitleEnabled || !currentSubtitleCues.length) {
    display.textContent = '';
    return;
  }
  
  const currentTime = videoElement.currentTime;
  let activeCue = null;
  for (var i = 0; i < currentSubtitleCues.length; i++) {
    var cue = currentSubtitleCues[i];
    if (currentTime >= cue.start && currentTime <= cue.end) {
      activeCue = cue;
      break;
    }
  }
  display.textContent = activeCue ? activeCue.text : '';
}

function disableSubtitles() {
  subtitleEnabled = false;
  if (subtitleInterval) clearInterval(subtitleInterval);
  document.getElementById('subtitle-display').textContent = '';
  document.getElementById('subtitle-status').innerHTML = 'Off';
}

// ========== CONTROLS SETUP ==========
function setupControls() {
  videoElement = document.getElementById('v');
  const controls = document.getElementById('custom-controls');
  const playPauseBtn = document.getElementById('play-pause-btn');
  const rewindBtn = document.getElementById('rewind-btn');
  const forwardBtn = document.getElementById('forward-btn');
  const progressContainer = document.getElementById('progress-container');
  const progressFill = document.getElementById('progress-fill');
  const currentTimeSpan = document.getElementById('current-time');
  const durationSpan = document.getElementById('duration');
  const volumeSlider = document.getElementById('volume-slider');
  const volumeBtn = document.getElementById('volume-btn');
  const fullscreenBtn = document.getElementById('fullscreen-btn');
  const pipBtn = document.getElementById('pip-btn');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsMenu = document.getElementById('settings-menu');
  
  const playIcon = document.getElementById('play-icon');
  const pauseIcon1 = document.getElementById('pause-icon1');
  const pauseIcon2 = document.getElementById('pause-icon2');
  
  function formatTime(seconds) {
    if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
    var hrs = Math.floor(seconds / 3600);
    var mins = Math.floor((seconds % 3600) / 60);
    var secs = Math.floor(seconds % 60);
    if (hrs > 0) {
      return hrs + ':' + (mins < 10 ? '0' + mins : mins) + ':' + (secs < 10 ? '0' + secs : secs);
    }
    return mins + ':' + (secs < 10 ? '0' + secs : secs);
  }
  
  function updatePlayPauseIcon() {
    if (videoElement.paused) {
      playIcon.style.display = 'block';
      pauseIcon1.style.display = 'none';
      pauseIcon2.style.display = 'none';
    } else {
      playIcon.style.display = 'none';
      pauseIcon1.style.display = 'block';
      pauseIcon2.style.display = 'block';
    }
  }
  
  function togglePlayPause() {
    if (videoElement.paused) videoElement.play();
    else videoElement.pause();
    updatePlayPauseIcon();
  }
  
  function seek(delta) {
    var newTime = videoElement.currentTime + delta;
    if (newTime < 0) newTime = 0;
    if (newTime > videoElement.duration) newTime = videoElement.duration;
    videoElement.currentTime = newTime;
  }
  
  function updateProgress() {
    if (videoElement.duration && isFinite(videoElement.duration)) {
      var percent = (videoElement.currentTime / videoElement.duration) * 100;
      progressFill.style.width = percent + '%';
      currentTimeSpan.textContent = formatTime(videoElement.currentTime);
      durationSpan.textContent = formatTime(videoElement.duration);
    }
  }
  
  function seekTo(e) {
    var rect = progressContainer.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var percent = x / rect.width;
    if (percent < 0) percent = 0;
    if (percent > 1) percent = 1;
    videoElement.currentTime = percent * videoElement.duration;
  }
  
  function showControls() {
    controls.classList.add('visible');
    if (controlsTimeout) clearTimeout(controlsTimeout);
    if (!videoElement.paused) {
      controlsTimeout = setTimeout(function() {
        controls.classList.remove('visible');
      }, 3000);
    }
  }
  
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
  
  function togglePIP() {
    if (document.pictureInPictureElement) {
      document.exitPictureInPicture();
    } else if (videoElement) {
      videoElement.requestPictureInPicture();
    }
  }
  
  videoElement.addEventListener('play', function() { updatePlayPauseIcon(); showControls(); });
  videoElement.addEventListener('pause', updatePlayPauseIcon);
  videoElement.addEventListener('timeupdate', updateProgress);
  videoElement.addEventListener('loadedmetadata', updateProgress);
  videoElement.addEventListener('mousemove', showControls);
  videoElement.addEventListener('click', togglePlayPause);
  controls.addEventListener('mousemove', showControls);
  
  playPauseBtn.addEventListener('click', togglePlayPause);
  rewindBtn.addEventListener('click', function() { seek(-10); });
  forwardBtn.addEventListener('click', function() { seek(10); });
  progressContainer.addEventListener('click', seekTo);
  volumeSlider.addEventListener('input', function(e) { 
    videoElement.volume = parseFloat(e.target.value); 
    videoElement.muted = false;
  });
  volumeBtn.addEventListener('click', function() { 
    videoElement.muted = !videoElement.muted; 
    volumeSlider.value = videoElement.muted ? 0 : videoElement.volume;
  });
  fullscreenBtn.addEventListener('click', toggleFullscreen);
  pipBtn.addEventListener('click', togglePIP);
  
  // Settings menu
  settingsBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    settingsMenu.classList.toggle('show');
  });
  
  document.addEventListener('click', function(e) {
    if (settingsMenu && !settingsMenu.contains(e.target) && e.target !== settingsBtn) {
      settingsMenu.classList.remove('show');
      document.getElementById('speed-submenu').classList.remove('show');
      document.getElementById('subtitle-submenu').classList.remove('show');
    }
  });
  
  // Speed submenu
  document.getElementById('speed-menu-item').addEventListener('click', function(e) {
    e.stopPropagation();
    var sub = document.getElementById('speed-submenu');
    sub.classList.toggle('show');
  });
  
  var speedItems = document.querySelectorAll('[data-speed]');
  for (var i = 0; i < speedItems.length; i++) {
    speedItems[i].addEventListener('click', function() {
      var speed = parseFloat(this.getAttribute('data-speed'));
      videoElement.playbackRate = speed;
      document.getElementById('current-speed-label').innerHTML = speed + 'x';
      settingsMenu.classList.remove('show');
    });
  }
  
  // Subtitle submenu
  document.getElementById('subtitle-menu-item').addEventListener('click', function(e) {
    e.stopPropagation();
    var sub = document.getElementById('subtitle-submenu');
    if (!sub.classList.contains('show')) {
      var langList = document.getElementById('subtitle-lang-list');
      var languages = [
        { code: 'en', name: 'English' }, { code: 'es', name: 'Español' }, 
        { code: 'fr', name: 'Français' }, { code: 'de', name: 'Deutsch' },
        { code: 'it', name: 'Italiano' }, { code: 'pt', name: 'Português' },
        { code: 'ru', name: 'Русский' }, { code: 'ja', name: '日本語' },
        { code: 'ko', name: '한국어' }, { code: 'zh', name: '中文' }
      ];
      var html = '';
      for (var i = 0; i < languages.length; i++) {
        html += '<div class="menu-item" data-lang="' + languages[i].code + '">' + languages[i].name + '</div>';
      }
      langList.innerHTML = html;
      
      var langItems = langList.querySelectorAll('[data-lang]');
      for (var j = 0; j < langItems.length; j++) {
        langItems[j].addEventListener('click', function() {
          currentLanguage = this.getAttribute('data-lang');
          loadSubtitles(currentLanguage);
          settingsMenu.classList.remove('show');
          sub.classList.remove('show');
        });
      }
    }
    sub.classList.toggle('show');
  });
  
  document.getElementById('disable-subtitle-item').addEventListener('click', function() {
    disableSubtitles();
    settingsMenu.classList.remove('show');
  });
  
  showControls();
}

// ========== STREAM PLAYBACK ==========
var rotatingMessages = ['Loading stream...', 'Contacting servers...', 'Almost there...'];
var msgInterval;

function startMessageRotation() {
  var idx = 0;
  var msgEl = document.getElementById('loader-text');
  msgInterval = setInterval(function() {
    idx = (idx + 1) % rotatingMessages.length;
    if (msgEl) msgEl.textContent = rotatingMessages[idx];
  }, 2200);
}

function stopMessageRotation() {
  if (msgInterval) clearInterval(msgInterval);
}

async function loadBackdrop(id, isTv) {
  try {
    var type = isTv ? 'tv' : 'movie';
    var response = await fetch('https://api.themoviedb.org/3/' + type + '/' + id + '?api_key=' + TMDB_KEY);
    var data = await response.json();
    var img = data.backdrop_path || data.poster_path;
    if (img) {
      var url = 'https://wsrv.nl/?url=' + encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img) + '&bg=black&blur=3';
      document.getElementById('loader-bg').style.backgroundImage = 'url(' + url + ')';
      document.getElementById('loader-bg').style.opacity = '1';
    }
  } catch(e) {}
}

function showError(msg) {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
}

async function playStream(playlistUrl, tmdbId, isTv, season, episode) {
  currentMediaId = tmdbId;
  currentIsTv = isTv;
  currentSeason = season;
  currentEpisode = episode;
  videoElement = document.getElementById('v');
  
  var src = '/api?url=' + encodeURIComponent(playlistUrl);
  
  if (Hls.isSupported()) {
    var hls = new Hls({ enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(videoElement);
    hls.on(Hls.Events.MANIFEST_PARSED, async function() {
      stopMessageRotation();
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
      setupControls();
      await loadSubtitles('en');
      videoElement.play().catch(function() {});
    });
    hls.on(Hls.Events.ERROR, function(_, data) {
      if (data.fatal) showError('Playback error');
    });
  } else {
    showError('HLS not supported');
  }
}

// ========== INIT ==========
var urlParams = new URLSearchParams(location.search);
var id = urlParams.get('id');
var season = urlParams.get('s');
var episode = urlParams.get('e');

if (!id) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  startMessageRotation();
  loadBackdrop(id, !!season);
  var apiEndpoint = '/api?' + (season ? 'id=' + id + '&s=' + season + '&e=' + (episode || '1') : 'id=' + id);
  fetch(apiEndpoint)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      playStream(data.url, id, !!season, season, episode || '1');
    })
    .catch(function(err) { showError(err.message); });
}
