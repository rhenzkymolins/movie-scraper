<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  font-family: system-ui, sans-serif;
  color: #fff;
  overflow: hidden;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  background: #000;
  z-index: 20;
}

#loader-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 0.6s ease;
  opacity: 0;
}

.spinner {
  position: relative;
  z-index: 1;
  width: 72px;
  height: 72px;
  border: 5px solid rgba(255,255,255,0.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#loader-text {
  position: relative;
  z-index: 1;
  font-size: 0.95rem;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.04em;
  text-shadow: 0 1px 4px #000;
}

#player {
  position: fixed;
  inset: 0;
  display: none;
  background: #000;
  z-index: 5;
}

video {
  width: 100%;
  height: 100%;
  display: block;
  background: #000;
}

#usage {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: #000;
  gap: 10px;
  z-index: 15;
}

#usage p {
  font-size: 1.05rem;
  color: rgba(255,255,255,0.65);
  line-height: 2;
}

#err {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: #000;
  z-index: 15;
}

#err-title {
  font-size: 2.4rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 18px;
}

#err-link {
  font-size: 1.1rem;
  color: #60a5fa;
  text-decoration: underline;
  cursor: pointer;
}

#err-link:hover {
  color: #93c5fd;
}

#err-detail {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.78rem;
  color: rgba(255,255,255,0.35);
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Custom Subtitle Container */
#subtitle-container {
  position: fixed;
  bottom: 80px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 55;
  pointer-events: none;
}

.subtitle-text {
  display: inline-block;
  background: transparent;
  color: white;
  font-size: 18px;
  font-family: system-ui, -apple-system, sans-serif;
  padding: 0.1em 0.3em;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  max-width: 90%;
  word-wrap: break-word;
  transition: all 0.15s ease;
}

/* CC Button - positioned near video controls */
.cc-button-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 60;
}

.cc-button {
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  padding: 10px 16px;
  border-radius: 40px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s ease;
}

.cc-button:hover {
  background: rgba(255, 255, 255, 0.2);
}

.cc-button.active {
  background: rgba(59, 130, 246, 0.8);
  border-color: rgba(59, 130, 246, 1);
}

/* Language Menu */
.lang-menu {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 8px;
  min-width: 180px;
  z-index: 61;
  display: none;
  border: 1px solid rgba(255, 255, 255, 0.2);
  max-height: 400px;
  overflow-y: auto;
}

.lang-menu.show {
  display: block;
}

.lang-menu button {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
  padding: 10px 12px;
  text-align: left;
  cursor: pointer;
  border-radius: 8px;
  font-size: 13px;
  transition: all 0.2s;
}

.lang-menu button:hover {
  background: rgba(255, 255, 255, 0.1);
}

.lang-menu .divider {
  height: 1px;
  background: rgba(255, 255, 255, 0.1);
  margin: 8px 0;
}

.no-subs-badge {
  position: fixed;
  bottom: 80px;
  right: 20px;
  z-index: 55;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  display: none;
}

/* Responsive font size for mobile */
@media (max-width: 768px) {
  .subtitle-text {
    font-size: 14px;
  }
  .cc-button {
    padding: 8px 14px;
    font-size: 12px;
  }
}

@media (max-width: 480px) {
  .subtitle-text {
    font-size: 12px;
  }
}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Stream</span><br><br>
    <code style="color:rgba(255,255,255,.8)">?id=550</code> &nbsp;— movie<br>
    <code style="color:rgba(255,255,255,.8)">?id=456&amp;s=1&amp;e=1</code> &nbsp;— TV episode
  </p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try vidsrc.xyz instead?</a>
  <div id="err-detail"></div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline></video>
</div>

<div id="subtitle-container">
  <div class="subtitle-text" id="subtitle-display"></div>
</div>

<div class="no-subs-badge" id="no-subs-badge">📄 No subtitles available</div>

<!-- CC Button -->
<div class="cc-button-container">
  <button class="cc-button" id="cc-button">
    <span>📺</span> <span id="cc-button-text">CC</span>
  </button>
</div>

<!-- Language Selection Menu -->
<div class="lang-menu" id="lang-menu">
  <div style="padding: 8px 12px; font-size: 12px; color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.1);">
    Select Subtitle Language
  </div>
  <div id="lang-list"></div>
  <div class="divider"></div>
  <button id="disable-subtitle-btn" style="color: #ff6b6b;">🚫 Disable Subtitles</button>
</div>

<script>
// ========== CONFIGURATION ==========
const WYZIE_API_KEY = "wyzie-17cb79da72500da5414937d15bbd0c7c";
const TMDB_KEY = '10bbe67e0f7cbf6673834b2412e2e392';

let videoElement = null;
let currentMediaId = null;
let currentIsTv = false;
let currentSeason = null;
let currentEpisode = null;
let availableSubtitles = [];
let currentSubtitleCues = [];
let subtitleEnabled = true;
let subtitleInterval = null;
let currentSubtitleIndex = -1;
let currentSubtitleUrl = null;
let currentLanguage = 'en';

// ========== CUSTOM SUBTITLE RENDERING ==========
async function fetchSubtitles(tmdbId, language, isTv, season, episode) {
  try {
    let searchId = tmdbId;
    if (isTv && season && episode) {
      searchId = `${tmdbId}_${season}_${episode}`;
    }
    const url = `https://sub.wyzie.io/search?id=${searchId}&language=${language}&key=${WYZIE_API_KEY}`;
    console.log('Fetching subtitles:', url);
    
    const response = await fetch(url);
    if (!response.ok) return [];
    
    const data = await response.json();
    if (Array.isArray(data) && data.length > 0) {
      return data;
    }
    return [];
  } catch (error) {
    console.error('Failed to fetch subtitles:', error);
    return [];
  }
}

async function fetchAllSubtitlesForLanguages(tmdbId, isTv, season, episode) {
  const languages = ['en', 'es', 'fr', 'de', 'it', 'pt', 'ru', 'ja', 'ko', 'zh', 'ar', 'hi'];
  const allSubtitles = {};
  
  for (const lang of languages) {
    const subs = await fetchSubtitles(tmdbId, lang, isTv, season, episode);
    if (subs.length > 0) {
      allSubtitles[lang] = subs;
    }
  }
  return allSubtitles;
}

async function loadSRT(url) {
  try {
    const proxyUrl = '/api?url=' + encodeURIComponent(url);
    const response = await fetch(proxyUrl);
    const srtText = await response.text();
    return parseSRT(srtText);
  } catch (error) {
    console.error('Failed to load SRT:', error);
    return [];
  }
}

function parseSRT(srtText) {
  const cues = [];
  const blocks = srtText.trim().split(/\r?\n\r?\n/);
  
  for (const block of blocks) {
    const lines = block.split(/\r?\n/);
    if (lines.length >= 3) {
      const timeMatch = lines[1].match(/(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})/);
      if (timeMatch) {
        const start = parseSRTTime(timeMatch[1]);
        const end = parseSRTTime(timeMatch[2]);
        const text = lines.slice(2).join(' ').trim();
        if (text) {
          cues.push({ start, end, text });
        }
      }
    }
  }
  return cues;
}

function parseSRTTime(timeStr) {
  const matches = timeStr.match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
  if (matches) {
    const hours = parseInt(matches[1]);
    const minutes = parseInt(matches[2]);
    const seconds = parseInt(matches[3]);
    const milliseconds = parseInt(matches[4]);
    return hours * 3600 + minutes * 60 + seconds + milliseconds / 1000;
  }
  return 0;
}

function updateSubtitleDisplay() {
  if (!videoElement || !subtitleEnabled || !currentSubtitleCues.length) {
    const subtitleDisplay = document.getElementById('subtitle-display');
    if (subtitleDisplay) subtitleDisplay.textContent = '';
    return;
  }
  
  const currentTime = videoElement.currentTime;
  let activeCue = null;
  
  for (const cue of currentSubtitleCues) {
    if (currentTime >= cue.start && currentTime <= cue.end) {
      activeCue = cue;
      break;
    }
  }
  
  const subtitleDisplay = document.getElementById('subtitle-display');
  if (activeCue) {
    subtitleDisplay.textContent = activeCue.text;
  } else {
    subtitleDisplay.textContent = '';
  }
}

async function loadSubtitleByUrl(url) {
  if (!url) return false;
  
  currentSubtitleUrl = url;
  
  try {
    // Clear existing interval
    if (subtitleInterval) {
      clearInterval(subtitleInterval);
    }
    
    // Load new SRT
    currentSubtitleCues = await loadSRT(url);
    
    if (currentSubtitleCues.length) {
      subtitleEnabled = true;
      document.getElementById('no-subs-badge').style.display = 'none';
      document.getElementById('cc-button-text').textContent = 'CC On';
      document.getElementById('cc-button').classList.add('active');
      
      // Start subtitle update interval
      subtitleInterval = setInterval(updateSubtitleDisplay, 100);
      return true;
    }
    return false;
  } catch (error) {
    console.error('Load subtitle error:', error);
    return false;
  }
}

async function loadSubtitles(language = 'en') {
  if (!currentMediaId) return false;
  
  const noSubsBadge = document.getElementById('no-subs-badge');
  
  try {
    availableSubtitles = await fetchSubtitles(currentMediaId, language, currentIsTv, currentSeason, currentEpisode);
    
    if (!availableSubtitles.length) {
      noSubsBadge.style.display = 'block';
      document.getElementById('cc-button-text').textContent = 'No Subs';
      document.getElementById('cc-button').classList.remove('active');
      return false;
    }
    
    currentLanguage = language;
    const success = await loadSubtitleByUrl(availableSubtitles[0].url);
    if (!success) {
      noSubsBadge.style.display = 'block';
      document.getElementById('cc-button-text').textContent = 'Error';
      return false;
    }
    
    noSubsBadge.style.display = 'none';
    return true;
  } catch (error) {
    console.error('Load subtitles error:', error);
    noSubsBadge.style.display = 'block';
    return false;
  }
}

function disableSubtitles() {
  subtitleEnabled = false;
  if (subtitleInterval) {
    clearInterval(subtitleInterval);
    subtitleInterval = null;
  }
  document.getElementById('subtitle-display').textContent = '';
  document.getElementById('cc-button-text').textContent = 'CC Off';
  document.getElementById('cc-button').classList.remove('active');
  currentSubtitleCues = [];
}

function enableSubtitles() {
  if (currentSubtitleCues.length) {
    subtitleEnabled = true;
    if (subtitleInterval) {
      clearInterval(subtitleInterval);
    }
    subtitleInterval = setInterval(updateSubtitleDisplay, 100);
    document.getElementById('cc-button-text').textContent = 'CC On';
    document.getElementById('cc-button').classList.add('active');
  }
}

function toggleSubtitles() {
  if (!currentSubtitleCues.length && availableSubtitles.length === 0) {
    // No subtitles loaded, try to load
    loadSubtitles(currentLanguage);
  } else if (subtitleEnabled) {
    disableSubtitles();
  } else {
    enableSubtitles();
  }
}

// ========== CC BUTTON AND MENU ==========
function showLanguageMenu() {
  const menu = document.getElementById('lang-menu');
  const isVisible = menu.classList.contains('show');
  
  if (isVisible) {
    menu.classList.remove('show');
  } else {
    // Populate language list
    const langList = document.getElementById('lang-list');
    const languages = [
      { code: 'en', name: '🇬🇧 English' },
      { code: 'es', name: '🇪🇸 Español' },
      { code: 'fr', name: '🇫🇷 Français' },
      { code: 'de', name: '🇩🇪 Deutsch' },
      { code: 'it', name: '🇮🇹 Italiano' },
      { code: 'pt', name: '🇵🇹 Português' },
      { code: 'ru', name: '🇷🇺 Русский' },
      { code: 'ja', name: '🇯🇵 日本語' },
      { code: 'ko', name: '🇰🇷 한국어' },
      { code: 'zh', name: '🇨🇳 中文' },
      { code: 'ar', name: '🇸🇦 العربية' },
      { code: 'hi', name: '🇮🇳 हिन्दी' }
    ];
    
    langList.innerHTML = languages.map(lang => `
      <button onclick="selectLanguage('${lang.code}')">
        ${lang.name}
      </button>
    `).join('');
    
    menu.classList.add('show');
  }
}

async function selectLanguage(langCode) {
  document.getElementById('lang-menu').classList.remove('show');
  await loadSubtitles(langCode);
}

// Close menu when clicking outside
document.addEventListener('click', (e) => {
  const menu = document.getElementById('lang-menu');
  const ccButton = document.getElementById('cc-button');
  if (menu && menu.classList.contains('show') && !menu.contains(e.target) && e.target !== ccButton) {
    menu.classList.remove('show');
  }
});

// ========== MESSAGES & UI HELPERS ==========
const rotatingMessages = [
  'Loading stream...', 'Contacting servers...', 'Almost there...',
  'Fetching subtitles...', 'Starting playback...'
];

let msgInterval;

function startMessageRotation() {
  let idx = 0;
  const msgEl = document.getElementById('loader-text');
  msgInterval = setInterval(() => {
    idx = (idx + 1) % rotatingMessages.length;
    if (msgEl) msgEl.textContent = rotatingMessages[idx];
  }, 2200);
}

function stopMessageRotation() {
  if (msgInterval) clearInterval(msgInterval);
}

async function loadBackdrop(id, isTv) {
  const type = isTv ? 'tv' : 'movie';
  try {
    const response = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}`);
    const data = await response.json();
    const img = data.backdrop_path || data.poster_path;
    if (img) {
      const url = `https://wsrv.nl/?url=${encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img)}&bg=black&blur=3`;
      const bgDiv = document.getElementById('loader-bg');
      const preload = new Image();
      preload.onload = () => {
        if (bgDiv) {
          bgDiv.style.backgroundImage = `url(${url})`;
          bgDiv.style.opacity = '1';
        }
      };
      preload.src = url;
    }
  } catch (e) {}
}

function showPlayer() {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player').style.display = 'block';
}

function showError(msg) {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
  
  const urlParams = new URLSearchParams(location.search);
  const isTv = !!urlParams.get('s');
  const mid = urlParams.get('id');
  const seas = urlParams.get('s') || '';
  const ep = urlParams.get('e') || '1';
  const vidsrcUrl = isTv
    ? 'https://vidsrc.xyz/embed/tv?tmdb=' + mid + '&season=' + seas + '&episode=' + ep
    : 'https://vidsrc.xyz/embed/movie?tmdb=' + mid;
  document.getElementById('err-link').href = vidsrcUrl;
}

// ========== STREAM PLAYBACK ==========
async function playStream(playlistUrl, tmdbId, isTv, season, episode) {
  currentMediaId = tmdbId;
  currentIsTv = isTv;
  currentSeason = season;
  currentEpisode = episode;
  
  const src = '/api?url=' + encodeURIComponent(playlistUrl);
  const video = document.getElementById('v');
  videoElement = video;
  
  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(video);
    
    hls.on(Hls.Events.MANIFEST_PARSED, async () => {
      showPlayer();
      await loadSubtitles('en');
      video.play().catch(e => console.log('Autoplay blocked:', e.message));
    });
    
    hls.on(Hls.Events.ERROR, function(_, data) {
      if (data.fatal) {
        showError(data.details || 'HLS fatal error');
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    video.addEventListener('canplay', async () => {
      showPlayer();
      await loadSubtitles('en');
      video.play().catch(e => console.log('Autoplay blocked:', e.message));
    });
  } else {
    showError('HLS not supported');
  }
}

// ========== INITIALIZATION ==========
const urlParams = new URLSearchParams(location.search);
const id = urlParams.get('id');
const season = urlParams.get('s');
const episode = urlParams.get('e');
const isTv = !!season;

if (!id) {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  startMessageRotation();
  loadBackdrop(id, isTv);
  
  const apiEndpoint = `/api?${isTv ? `id=${id}&s=${season}&e=${episode || '1'}` : `id=${id}`}`;
  
  fetch(apiEndpoint)
    .then(response => response.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      if (!data.url) throw new Error('No stream URL received');
      playStream(data.url, id, isTv, season, episode || '1');
    })
    .catch(err => showError(err.message));
}

// ========== EVENT LISTENERS ==========
const ccButton = document.getElementById('cc-button');
const disableSubtitleBtn = document.getElementById('disable-subtitle-btn');

ccButton?.addEventListener('click', (e) => {
  e.stopPropagation();
  showLanguageMenu();
});

disableSubtitleBtn?.addEventListener('click', () => {
  document.getElementById('lang-menu').classList.remove('show');
  disableSubtitles();
});

// Clean up on page unload
window.addEventListener('beforeunload', () => {
  if (subtitleInterval) {
    clearInterval(subtitleInterval);
  }
});

// Make selectLanguage available globally
window.selectLanguage = selectLanguage;
window.disableSubtitles = disableSubtitles;
</script>
</body>
</html>
