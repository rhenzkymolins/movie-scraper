<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  font-family: system-ui, sans-serif;
  color: #fff;
  overflow: hidden;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  background: #000;
  z-index: 20;
}

#loader-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 0.6s ease;
  opacity: 0;
}

.spinner {
  position: relative;
  z-index: 1;
  width: 72px;
  height: 72px;
  border: 5px solid rgba(255,255,255,0.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#loader-text {
  position: relative;
  z-index: 1;
  font-size: 0.95rem;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.04em;
  text-shadow: 0 1px 4px #000;
}

#player {
  position: fixed;
  inset: 0;
  display: none;
  background: #000;
  z-index: 5;
}

video {
  width: 100%;
  height: 100%;
  display: block;
  background: #000;
}

#usage {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: #000;
  gap: 10px;
  z-index: 15;
}

#usage p {
  font-size: 1.05rem;
  color: rgba(255,255,255,0.65);
  line-height: 2;
}

#err {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: #000;
  z-index: 15;
}

#err-title {
  font-size: 2.4rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 18px;
}

#err-link {
  font-size: 1.1rem;
  color: #60a5fa;
  text-decoration: underline;
  cursor: pointer;
}

#err-link:hover {
  color: #93c5fd;
}

#err-detail {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.78rem;
  color: rgba(255,255,255,0.35);
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Custom Subtitle Container */
#subtitle-container {
  position: fixed;
  bottom: 80px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 55;
  pointer-events: none;
}

.subtitle-text {
  display: inline-block;
  background: rgba(0, 0, 0, 0.75);
  color: white;
  font-size: 22px;
  font-family: system-ui, -apple-system, sans-serif;
  padding: 0.2em 0.5em;
  border-radius: 8px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  max-width: 90%;
  word-wrap: break-word;
  transition: all 0.15s ease;
}

/* Settings Panel - Integrated */
.settings-panel {
  position: fixed;
  bottom: 80px;
  right: 20px;
  z-index: 60;
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 12px;
  display: none;
  flex-direction: column;
  gap: 10px;
  min-width: 200px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.settings-panel.show {
  display: flex;
}

.settings-panel button {
  background: rgba(255, 255, 255, 0.1);
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  text-align: left;
  transition: all 0.2s;
}

.settings-panel button:hover {
  background: rgba(255, 255, 255, 0.2);
}

.settings-panel .divider {
  height: 1px;
  background: rgba(255, 255, 255, 0.2);
  margin: 5px 0;
}

.settings-panel .speed-option, .settings-panel .subtitle-option {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.speed-value {
  color: #60a5fa;
}

.subtitle-style-btn {
  background: rgba(59, 130, 246, 0.3) !important;
}

/* Modal for detailed settings */
#style-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(12px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.style-card {
  background: #1a1a24;
  border-radius: 24px;
  width: 90%;
  max-width: 400px;
  padding: 24px;
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.style-card h3 {
  font-size: 1.4rem;
  margin-bottom: 20px;
}

.style-control {
  margin-bottom: 16px;
}

.style-control label {
  display: block;
  font-size: 0.85rem;
  margin-bottom: 6px;
  color: #ccc;
}

.style-control input, .style-control select {
  width: 100%;
  background: #2a2a35;
  border: 1px solid #3a3a45;
  padding: 8px 12px;
  border-radius: 12px;
  color: white;
  font-size: 0.9rem;
  outline: none;
}

.style-control input[type="color"] {
  width: 60px;
  height: 40px;
  padding: 2px;
}

.range-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.range-row input {
  flex: 1;
}

.close-style {
  background: white;
  border: none;
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  font-weight: bold;
  margin-top: 16px;
  cursor: pointer;
}

#no-subs-badge {
  position: fixed;
  bottom: 80px;
  right: 20px;
  z-index: 55;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  display: none;
}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Stream</span><br><br>
    <code style="color:rgba(255,255,255,.8)">?id=550</code> &nbsp;— movie<br>
    <code style="color:rgba(255,255,255,.8)">?id=456&amp;s=1&amp;e=1</code> &nbsp;— TV episode
  </p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try vidsrc.xyz instead?</a>
  <div id="err-detail"></div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline></video>
</div>

<div id="subtitle-container">
  <div class="subtitle-text" id="subtitle-display"></div>
</div>

<div id="no-subs-badge">📄 No subtitles available</div>

<!-- Settings Panel -->
<div id="settings-panel" class="settings-panel">
  <div class="speed-option">
    <span>▶ Playback Speed</span>
    <span class="speed-value" id="current-speed">1x</span>
  </div>
  <button id="speed-075">0.75x</button>
  <button id="speed-1">1x (Normal)</button>
  <button id="speed-125">1.25x</button>
  <button id="speed-15">1.5x</button>
  <button id="speed-2">2x</button>
  <div class="divider"></div>
  <div class="subtitle-option">
    <span>📝 Subtitles</span>
  </div>
  <button id="subtitle-toggle">🔊 CC On/Off</button>
  <button id="subtitle-language">🌐 Change Language</button>
  <button id="subtitle-style-btn" class="subtitle-style-btn">🎨 Subtitle Style</button>
</div>

<!-- Language Selection Modal -->
<div id="lang-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(12px);align-items:center;justify-content:center;z-index:100">
  <div class="style-card" style="max-width:300px">
    <h3>Select Language</h3>
    <div id="lang-list" style="max-height:300px;overflow-y:auto"></div>
    <button class="close-style" onclick="document.getElementById('lang-modal').style.display='none'">Cancel</button>
  </div>
</div>

<!-- Subtitle Style Modal -->
<div id="style-modal">
  <div class="style-card">
    <h3>🎨 Subtitle Style</h3>
    <div class="style-control">
      <label>Font Size</label>
      <div class="range-row">
        <input type="range" id="font-size" min="12" max="48" step="1" value="22">
        <span id="font-size-val">22px</span>
      </div>
    </div>
    <div class="style-control">
      <label>Font Family</label>
      <select id="font-family">
        <option value="system-ui, sans-serif">System</option>
        <option value="'Segoe UI', Roboto">Segoe UI</option>
        <option value="'Inter', sans-serif">Inter</option>
        <option value="'Courier New', monospace">Monospace</option>
      </select>
    </div>
    <div class="style-control">
      <label>Text Color</label>
      <input type="color" id="text-color" value="#FFFFFF">
    </div>
    <div class="style-control">
      <label>Background Color</label>
      <input type="color" id="bg-color" value="#000000">
    </div>
    <div class="style-control">
      <label>Background Opacity</label>
      <div class="range-row">
        <input type="range" id="bg-opacity" min="0" max="1" step="0.05" value="0.75">
        <span id="opacity-val">0.75</span>
      </div>
    </div>
    <button class="close-style" id="close-style-btn">Apply & Close</button>
  </div>
</div>

<script>
// ========== CONFIGURATION ==========
const WYZIE_API_KEY = "wyzie-17cb79da72500da5414937d15bbd0c7c";
const TMDB_KEY = '10bbe67e0f7cbf6673834b2412e2e392';

let videoElement = null;
let currentMediaId = null;
let currentIsTv = false;
let currentSeason = null;
let currentEpisode = null;
let availableSubtitles = [];
let currentSubtitleCues = [];
let subtitleEnabled = true;
let subtitleInterval = null;
let currentSubtitleIndex = 0;
let currentSubtitleUrl = null;

// ========== CUSTOM SUBTITLE RENDERING ==========
async function fetchSubtitles(tmdbId, language, isTv, season, episode) {
  try {
    let searchId = tmdbId;
    if (isTv && season && episode) {
      searchId = `${tmdbId}_${season}_${episode}`;
    }
    const url = `https://sub.wyzie.io/search?id=${searchId}&language=${language}&key=${WYZIE_API_KEY}`;
    console.log('Fetching subtitles:', url);
    
    const response = await fetch(url);
    if (!response.ok) return [];
    
    const data = await response.json();
    if (Array.isArray(data) && data.length > 0) {
      return data;
    }
    return [];
  } catch (error) {
    console.error('Failed to fetch subtitles:', error);
    return [];
  }
}

async function loadSRT(url) {
  try {
    const proxyUrl = '/api?url=' + encodeURIComponent(url);
    const response = await fetch(proxyUrl);
    const srtText = await response.text();
    return parseSRT(srtText);
  } catch (error) {
    console.error('Failed to load SRT:', error);
    return [];
  }
}

function parseSRT(srtText) {
  const cues = [];
  const blocks = srtText.trim().split(/\r?\n\r?\n/);
  
  for (const block of blocks) {
    const lines = block.split(/\r?\n/);
    if (lines.length >= 3) {
      const timeMatch = lines[1].match(/(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})/);
      if (timeMatch) {
        const start = parseSRTTime(timeMatch[1]);
        const end = parseSRTTime(timeMatch[2]);
        const text = lines.slice(2).join(' ').trim();
        if (text) {
          cues.push({ start, end, text });
        }
      }
    }
  }
  return cues;
}

function parseSRTTime(timeStr) {
  const matches = timeStr.match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
  if (matches) {
    const hours = parseInt(matches[1]);
    const minutes = parseInt(matches[2]);
    const seconds = parseInt(matches[3]);
    const milliseconds = parseInt(matches[4]);
    return hours * 3600 + minutes * 60 + seconds + milliseconds / 1000;
  }
  return 0;
}

function updateSubtitleDisplay() {
  if (!videoElement || !subtitleEnabled || !currentSubtitleCues.length) {
    const subtitleDisplay = document.getElementById('subtitle-display');
    if (subtitleDisplay) subtitleDisplay.textContent = '';
    return;
  }
  
  const currentTime = videoElement.currentTime;
  let activeCue = null;
  
  for (const cue of currentSubtitleCues) {
    if (currentTime >= cue.start && currentTime <= cue.end) {
      activeCue = cue;
      break;
    }
  }
  
  const subtitleDisplay = document.getElementById('subtitle-display');
  if (activeCue) {
    subtitleDisplay.textContent = activeCue.text;
    applySubtitleStylesToElement();
  } else {
    subtitleDisplay.textContent = '';
  }
}

function applySubtitleStylesToElement() {
  const subtitleDisplay = document.getElementById('subtitle-display');
  if (!subtitleDisplay) return;
  
  const fontSize = document.getElementById('font-size').value + 'px';
  const fontFamily = document.getElementById('font-family').value;
  const textColor = document.getElementById('text-color').value;
  const bgColor = document.getElementById('bg-color').value;
  const bgOpacity = parseFloat(document.getElementById('bg-opacity').value);
  
  let bgRgba = bgColor;
  if (bgColor.startsWith('#')) {
    const r = parseInt(bgColor.slice(1, 3), 16);
    const g = parseInt(bgColor.slice(3, 5), 16);
    const b = parseInt(bgColor.slice(5, 7), 16);
    bgRgba = `rgba(${r}, ${g}, ${b}, ${bgOpacity})`;
  }
  
  subtitleDisplay.style.fontSize = fontSize;
  subtitleDisplay.style.fontFamily = fontFamily;
  subtitleDisplay.style.color = textColor;
  subtitleDisplay.style.backgroundColor = bgRgba;
}

async function loadSubtitleByIndex(index) {
  if (!availableSubtitles.length) return false;
  
  const subtitle = availableSubtitles[index];
  if (!subtitle || !subtitle.url) return false;
  
  currentSubtitleUrl = subtitle.url;
  
  try {
    // Clear existing interval
    if (subtitleInterval) {
      clearInterval(subtitleInterval);
    }
    
    // Load new SRT
    currentSubtitleCues = await loadSRT(subtitle.url);
    
    if (currentSubtitleCues.length) {
      subtitleEnabled = true;
      document.getElementById('no-subs-badge').style.display = 'none';
      
      // Start subtitle update interval
      subtitleInterval = setInterval(updateSubtitleDisplay, 100);
      return true;
    }
    return false;
  } catch (error) {
    console.error('Load subtitle error:', error);
    return false;
  }
}

async function loadSubtitles(language = 'en') {
  if (!currentMediaId) return false;
  
  const noSubsBadge = document.getElementById('no-subs-badge');
  
  try {
    availableSubtitles = await fetchSubtitles(currentMediaId, language, currentIsTv, currentSeason, currentEpisode);
    
    if (!availableSubtitles.length) {
      noSubsBadge.style.display = 'block';
      return false;
    }
    
    const success = await loadSubtitleByIndex(0);
    if (!success) {
      noSubsBadge.style.display = 'block';
      return false;
    }
    
    noSubsBadge.style.display = 'none';
    return true;
  } catch (error) {
    console.error('Load subtitles error:', error);
    noSubsBadge.style.display = 'block';
    return false;
  }
}

function toggleSubtitles() {
  subtitleEnabled = !subtitleEnabled;
  if (!subtitleEnabled) {
    document.getElementById('subtitle-display').textContent = '';
  } else {
    updateSubtitleDisplay();
  }
}

function applySubtitleStyles() {
  applySubtitleStylesToElement();
  updateSubtitleDisplay();
}

// ========== PLAYBACK SPEED ==========
function setPlaybackSpeed(speed) {
  if (!videoElement) return;
  videoElement.playbackRate = speed;
  document.getElementById('current-speed').textContent = speed + 'x';
}

// ========== SETTINGS PANEL ==========
function toggleSettingsPanel() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('show');
}

// Close panel when clicking outside
document.addEventListener('click', (e) => {
  const panel = document.getElementById('settings-panel');
  const video = document.getElementById('v');
  if (panel && panel.classList.contains('show') && !panel.contains(e.target) && e.target !== video) {
    panel.classList.remove('show');
  }
});

// ========== MESSAGES & UI HELPERS ==========
const rotatingMessages = [
  'Loading stream...', 'Contacting the mothership...', 'Bribing the servers...',
  'Untangling the cables...', 'Asking nicely...', 'Decoding the matrix...',
  'Warming up the hamsters...', 'Negotiating the cloud...', 'Almost there...',
  'Fetching subtitles...', 'Summoning bandwidth...'
];

let msgInterval;

function startMessageRotation() {
  let idx = 0;
  const msgEl = document.getElementById('loader-text');
  msgInterval = setInterval(() => {
    idx = (idx + 1) % rotatingMessages.length;
    if (msgEl) msgEl.textContent = rotatingMessages[idx];
  }, 2200);
}

function stopMessageRotation() {
  if (msgInterval) clearInterval(msgInterval);
}

async function loadBackdrop(id, isTv) {
  const type = isTv ? 'tv' : 'movie';
  try {
    const response = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}`);
    const data = await response.json();
    const img = data.backdrop_path || data.poster_path;
    if (img) {
      const url = `https://wsrv.nl/?url=${encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img)}&bg=black&blur=3`;
      const bgDiv = document.getElementById('loader-bg');
      const preload = new Image();
      preload.onload = () => {
        if (bgDiv) {
          bgDiv.style.backgroundImage = `url(${url})`;
          bgDiv.style.opacity = '1';
        }
      };
      preload.src = url;
    }
  } catch (e) {}
}

function showPlayer() {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player').style.display = 'block';
}

function showError(msg) {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
  
  const urlParams = new URLSearchParams(location.search);
  const isTv = !!urlParams.get('s');
  const mid = urlParams.get('id');
  const seas = urlParams.get('s') || '';
  const ep = urlParams.get('e') || '1';
  const vidsrcUrl = isTv
    ? 'https://vidsrc.xyz/embed/tv?tmdb=' + mid + '&season=' + seas + '&episode=' + ep
    : 'https://vidsrc.xyz/embed/movie?tmdb=' + mid;
  document.getElementById('err-link').href = vidsrcUrl;
}

// ========== STREAM PLAYBACK ==========
async function playStream(playlistUrl, tmdbId, isTv, season, episode) {
  currentMediaId = tmdbId;
  currentIsTv = isTv;
  currentSeason = season;
  currentEpisode = episode;
  
  const src = '/api?url=' + encodeURIComponent(playlistUrl);
  const video = document.getElementById('v');
  videoElement = video;
  
  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(video);
    
    hls.on(Hls.Events.MANIFEST_PARSED, async () => {
      showPlayer();
      await loadSubtitles('en');
      video.play().catch(e => console.log('Autoplay blocked:', e.message));
    });
    
    hls.on(Hls.Events.ERROR, function(_, data) {
      if (data.fatal) {
        showError(data.details || 'HLS fatal error');
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    video.addEventListener('canplay', async () => {
      showPlayer();
      await loadSubtitles('en');
      video.play().catch(e => console.log('Autoplay blocked:', e.message));
    });
  } else {
    showError('HLS not supported');
  }
}

// ========== LANGUAGE SELECTION ==========
function showLanguageSelector() {
  const langModal = document.getElementById('lang-modal');
  const langList = document.getElementById('lang-list');
  
  const languages = [
    { code: 'en', name: 'English' },
    { code: 'es', name: 'Español' },
    { code: 'fr', name: 'Français' },
    { code: 'de', name: 'Deutsch' },
    { code: 'it', name: 'Italiano' },
    { code: 'pt', name: 'Português' },
    { code: 'ru', name: 'Русский' },
    { code: 'ja', name: '日本語' },
    { code: 'ko', name: '한국어' },
    { code: 'zh', name: '中文' },
    { code: 'ar', name: 'العربية' },
    { code: 'hi', name: 'हिन्दी' }
  ];
  
  langList.innerHTML = languages.map(lang => `
    <button style="width:100%;margin:5px 0;padding:10px;background:#2a2a35;border:none;border-radius:8px;color:white;cursor:pointer"
            onclick="selectLanguage('${lang.code}')">
      ${lang.name}
    </button>
  `).join('');
  
  langModal.style.display = 'flex';
}

async function selectLanguage(langCode) {
  document.getElementById('lang-modal').style.display = 'none';
  await loadSubtitles(langCode);
}

// ========== INITIALIZATION ==========
const urlParams = new URLSearchParams(location.search);
const id = urlParams.get('id');
const season = urlParams.get('s');
const episode = urlParams.get('e');
const isTv = !!season;

if (!id) {
  stopMessageRotation();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  startMessageRotation();
  loadBackdrop(id, isTv);
  
  const apiEndpoint = `/api?${isTv ? `id=${id}&s=${season}&e=${episode || '1'}` : `id=${id}`}`;
  
  fetch(apiEndpoint)
    .then(response => response.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      if (!data.url) throw new Error('No stream URL received');
      playStream(data.url, id, isTv, season, episode || '1');
    })
    .catch(err => showError(err.message));
}

// ========== EVENT LISTENERS ==========
// Settings panel buttons
document.getElementById('subtitle-toggle')?.addEventListener('click', toggleSubtitles);
document.getElementById('subtitle-language')?.addEventListener('click', showLanguageSelector);
document.getElementById('subtitle-style-btn')?.addEventListener('click', () => {
  document.getElementById('style-modal').style.display = 'flex';
  document.getElementById('settings-panel').classList.remove('show');
});
document.getElementById('close-style-btn')?.addEventListener('click', () => {
  document.getElementById('style-modal').style.display = 'none';
  applySubtitleStyles();
});

// Speed buttons
document.getElementById('speed-075')?.addEventListener('click', () => setPlaybackSpeed(0.75));
document.getElementById('speed-1')?.addEventListener('click', () => setPlaybackSpeed(1));
document.getElementById('speed-125')?.addEventListener('click', () => setPlaybackSpeed(1.25));
document.getElementById('speed-15')?.addEventListener('click', () => setPlaybackSpeed(1.5));
document.getElementById('speed-2')?.addEventListener('click', () => setPlaybackSpeed(2));

// Style inputs
document.getElementById('font-size')?.addEventListener('input', (e) => {
  document.getElementById('font-size-val').innerText = e.target.value + 'px';
  applySubtitleStyles();
});
document.getElementById('font-family')?.addEventListener('change', applySubtitleStyles);
document.getElementById('text-color')?.addEventListener('input', applySubtitleStyles);
document.getElementById('bg-color')?.addEventListener('input', applySubtitleStyles);
document.getElementById('bg-opacity')?.addEventListener('input', (e) => {
  document.getElementById('opacity-val').innerText = e.target.value;
  applySubtitleStyles();
});

// Right-click context menu on video to show settings
videoElement?.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  toggleSettingsPanel();
});

// Also add a settings button in the corner
const settingsBtn = document.createElement('button');
settingsBtn.innerHTML = '⚙️';
settingsBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:50;background:rgba(0,0,0,0.7);border:none;color:white;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2)';
settingsBtn.onclick = toggleSettingsPanel;
document.body.appendChild(settingsBtn);

// Load saved settings
function loadSavedSettings() {
  const saved = localStorage.getItem('subtitleSettings');
  if (saved) {
    try {
      const settings = JSON.parse(saved);
      if (document.getElementById('font-size')) document.getElementById('font-size').value = settings.fontSize || 22;
      if (document.getElementById('font-family')) document.getElementById('font-family').value = settings.fontFamily || 'system-ui, sans-serif';
      if (document.getElementById('text-color')) document.getElementById('text-color').value = settings.textColor || '#FFFFFF';
      if (document.getElementById('bg-color')) document.getElementById('bg-color').value = settings.bgColor || '#000000';
      if (document.getElementById('bg-opacity')) document.getElementById('bg-opacity').value = settings.bgOpacity || 0.75;
      
      document.getElementById('font-size-val').innerText = (settings.fontSize || 22) + 'px';
      document.getElementById('opacity-val').innerText = settings.bgOpacity || 0.75;
    } catch(e) {}
  }
}

function saveSettings() {
  const settings = {
    fontSize: document.getElementById('font-size')?.value || 22,
    fontFamily: document.getElementById('font-family')?.value || 'system-ui, sans-serif',
    textColor: document.getElementById('text-color')?.value || '#FFFFFF',
    bgColor: document.getElementById('bg-color')?.value || '#000000',
    bgOpacity: document.getElementById('bg-opacity')?.value || 0.75
  };
  localStorage.setItem('subtitleSettings', JSON.stringify(settings));
}

document.getElementById('font-size')?.addEventListener('change', saveSettings);
document.getElementById('font-family')?.addEventListener('change', saveSettings);
document.getElementById('text-color')?.addEventListener('change', saveSettings);
document.getElementById('bg-color')?.addEventListener('change', saveSettings);
document.getElementById('bg-opacity')?.addEventListener('change', saveSettings);

loadSavedSettings();

// Expose functions globally for language selector
window.selectLanguage = selectLanguage;
</script>
</body>
</html>
